services:
  exdash-db-local:
    image: postgres:18-alpine
    container_name: exdash-db-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: exdash
      POSTGRES_PASSWORD: exdash_dev
      POSTGRES_DB: exdash_metadata
    ports:
      - "15433:5432"
    volumes:
      - exdash-db-data-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exdash -d exdash_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - empowerx-net-local

  exdash:
    build:
      context: .
      args:
        VITE_EXDASH_API_URL: /api/exdash
    image: exdash:local
    container_name: exdash
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      exdash-db-local:
        condition: service_healthy
    networks:
      - empowerx-net-local

  exdash-db-admin-local:
    image: adminer:latest
    container_name: exdash-db-admin-local
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      exdash-db-local:
        condition: service_healthy
    networks:
      - empowerx-net-local

volumes:
  exdash-db-data-local:

networks:
  empowerx-net-local:
    external: true
